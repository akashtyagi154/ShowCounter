<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Ledger Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #2c3e50; --accent: #27ae60; --danger: #e74c3c; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; -webkit-tap-highlight-color: transparent; }
        .container { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); box-sizing: border-box; }
        
        h1, h2 { text-align: center; color: var(--primary); margin: 10px 0; font-size: 1.4rem; border-bottom: 2px solid #eee; padding-bottom: 8px; }
        .section { margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        /* Layout & Controls */
        .controls { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-bottom: 15px; }
        input[type="text"], input[type="number"], select { flex: 1; min-width: 100px; padding: 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 1rem; }
        
        button { border: none; border-radius: 8px; padding: 12px 16px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-main { background: var(--primary); color: white; flex: 1; }
        .btn-sec { background: #edf2f7; color: var(--primary); flex: 1; }
        .btn-add { background: var(--accent); color: white; }
        .btn-danger { background: #fee2e2; color: var(--danger); width: 100%; margin-top: 10px; }
        .btn-share { background: #3498db; color: white; width: 100%; margin-top: 10px; }

        /* Match Entry Area */
        .match-entry-card { background: #f8fafc; border: 1px solid #e2e8f0; padding: 15px; border-radius: 12px; margin-top: 15px; }
        .player-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; align-items: center; margin-bottom: 10px; }
        .player-label { font-weight: bold; color: var(--primary); }

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin: 10px 0; }
        th { background: #f1f5f9; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .positive { color: var(--accent); font-weight: bold; }
        .negative { color: var(--danger); font-weight: bold; }

        /* Charts */
        .chart-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-top: 20px; }
        .chart-card { background: #fff; border: 1px solid #eee; border-radius: 10px; padding: 15px; height: 280px; position: relative; }
        
        #historyLog { max-height: 250px; overflow-y: auto; background: #fafafa; border-radius: 8px; padding: 10px; border: 1px solid #eee; }
        .hist-entry { padding: 10px; border-bottom: 1px solid #eef; font-size: 0.85rem; line-height: 1.4; }
        .hidden { display: none; }

        @media (min-width: 600px) {
            .chart-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Match Ledger Pro</h1>

    <div class="section">
        <div class="controls">
            <input type="text" id="playerName" placeholder="Enter Player Name">
            <button class="btn-add" onclick="addPlayer()">Add Player</button>
        </div>
        <div class="controls">
            <button class="btn-main" onclick="toggleMatchEntry()">New Match Entry</button>
            <button class="btn-sec" onclick="exportData()">Backup</button>
            <button class="btn-sec" onclick="document.getElementById('importFile').click()">Restore</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div id="matchEntryArea" class="section hidden">
        <h2>Enter Final Match Scores</h2>
        <div class="match-entry-card">
            <div id="playerInputs">
                </div>
            <p style="font-size: 0.8rem; color: #666; text-align: center;">Total points must equal <span id="targetSum">15</span></p>
            <button class="btn-add" style="width: 100%;" onclick="submitMatch()">Submit Final Match Result</button>
            <button class="btn-sec" style="width: 100%; margin-top: 5px;" onclick="toggleMatchEntry()">Cancel</button>
        </div>
    </div>

    <div id="captureZone">
        <div class="section">
            <h2>📊 Performance Analytics</h2>
            <div class="chart-grid">
                <div class="chart-card">
                    <canvas id="balanceChart"></canvas>
                </div>
                <div class="chart-card">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>Current Balances</h2>
            <table>
                <thead>
                    <tr>
                        <th>Player</th>
                        <th>Total Score</th>
                    </tr>
                </thead>
                <tbody id="balanceBody"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <button class="btn-share" onclick="shareResult()">Download Results Image</button>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
            <h2>Recent History</h2>
            <button class="btn-sec" style="font-size: 0.7rem; padding: 5px 10px; flex: none;" onclick="undoLastMatch()">Undo Last Match</button>
        </div>
        <div id="historyLog"></div>
        
        <div class="controls" style="margin-top: 20px;">
            <select id="removeSelector" style="flex:2;"></select>
            <button class="btn-danger" style="flex:1; margin-top:0;" onclick="removePlayer()">Remove Player</button>
        </div>
        <button class="btn-danger" onclick="clearSession()">Reset Entire Ledger</button>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('m_players')) || {};
    let history = JSON.parse(localStorage.getItem('m_history')) || [];
    let chartObjects = {};

    // Initialization
    function init() {
        initCharts();
        updateUI();
    }

    function initCharts() {
        const options = { responsive: true, maintainAspectRatio: false, animation: false };
        
        chartObjects.balance = new Chart(document.getElementById('balanceChart'), {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Balance', data: [], backgroundColor: [] }] },
            options: { ...options, plugins: { title: { display: true, text: 'Total Net Points' }, legend: { display: false } } }
        });

        chartObjects.trend = new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: { labels: [], datasets: [] },
            options: { ...options, plugins: { title: { display: true, text: 'Score Progression' } } }
        });
    }

    function updateUI() {
        renderBalanceTable();
        renderHistory();
        updateCharts();
        populateRemoveDropdown();
        localStorage.setItem('m_players', JSON.stringify(players));
        localStorage.setItem('m_history', JSON.stringify(history));
    }

    // Player Management
    function addPlayer() {
        const name = document.getElementById('playerName').value.trim();
        if (name && !players.hasOwnProperty(name)) {
            players[name] = 0;
            document.getElementById('playerName').value = '';
            updateUI();
        }
    }

    function removePlayer() {
        const name = document.getElementById('removeSelector').value;
        if (name && confirm(`Remove ${name}? Current score will be lost.`)) {
            delete players[name];
            updateUI();
        }
    }

    function populateRemoveDropdown() {
        const sel = document.getElementById('removeSelector');
        sel.innerHTML = '<option value="">Select player to remove...</option>';
        Object.keys(players).sort().forEach(n => {
            sel.innerHTML += `<option value="${n}">${n}</option>`;
        });
    }

    // Match Logic
    function toggleMatchEntry() {
        const area = document.getElementById('matchEntryArea');
        const names = Object.keys(players).sort();
        
        if (names.length < 2) return alert("Add at least 2 players first!");
        
        area.classList.toggle('hidden');
        const container = document.getElementById('playerInputs');
        container.innerHTML = '';
        
        names.forEach(name => {
            container.innerHTML += `
                <div class="player-row">
                    <span class="player-label">${name}</span>
                    <input type="number" class="match-score-input" data-name="${name}" value="0">
                </div>`;
        });

        // Set target sum hint (e.g., 5 points per player average, or customize as needed)
        document.getElementById('targetSum').innerText = names.length * 5;
    }

    function submitMatch() {
        const inputs = document.querySelectorAll('.match-score-input');
        const names = Object.keys(players).sort();
        const expectedSum = names.length * 5;
        let currentSum = 0;
        let matchData = {};

        inputs.forEach(input => {
            const val = parseInt(input.value) || 0;
            const name = input.getAttribute('data-name');
            matchData[name] = val;
            currentSum += val;
        });

        if (currentSum !== expectedSum) {
            return alert(`Error: Total scores must sum to ${expectedSum}. Current sum: ${currentSum}`);
        }

        // Calculate Diffs (Score - 5)
        let diffs = {};
        for (let name in matchData) {
            const d = matchData[name] - 5;
            players[name] += d;
            diffs[name] = d;
        }

        // Save to History
        const logEntry = {
            timestamp: new Date().toLocaleString(),
            scores: matchData,
            diffs: diffs
        };
        history.push(logEntry);

        document.getElementById('matchEntryArea').classList.add('hidden');
        updateUI();
    }

    function undoLastMatch() {
        if (history.length === 0) return alert("No history to undo.");
        if (confirm("Undo the last match result?")) {
            const last = history.pop();
            for (let name in last.diffs) {
                if (players.hasOwnProperty(name)) {
                    players[name] -= last.diffs[name];
                }
            }
            updateUI();
        }
    }

    // Rendering
    function renderBalanceTable() {
        const body = document.getElementById('balanceBody');
        body.innerHTML = '';
        Object.keys(players).sort().forEach(name => {
            const val = players[name];
            const row = body.insertRow();
            row.insertCell(0).innerText = name;
            const cellVal = row.insertCell(1);
            cellVal.innerText = val;
            cellVal.className = val >= 0 ? 'positive' : 'negative';
        });
    }

    function renderHistory() {
        const log = document.getElementById('historyLog');
        log.innerHTML = history.slice().reverse().map((h, i) => {
            const scoreDetails = Object.entries(h.scores).map(([n, s]) => `${n}: ${s}`).join(' | ');
            return `<div class="hist-entry">
                <strong>Match #${history.length - i}</strong> <small>(${h.timestamp})</small><br>
                ${scoreDetails}
            </div>`;
        }).join('');
    }

    function updateCharts() {
        const names = Object.keys(players).sort();
        const vals = names.map(n => players[n]);

        // Balance Chart
        chartObjects.balance.data.labels = names;
        chartObjects.balance.data.datasets[0].data = vals;
        chartObjects.balance.data.datasets[0].backgroundColor = vals.map(v => v >= 0 ? '#27ae60' : '#e74c3c');
        chartObjects.balance.update();

        // Trend Chart
        chartObjects.trend.data.labels = history.map((_, i) => i + 1);
        chartObjects.trend.data.datasets = names.map((name, idx) => {
            let total = 0;
            const data = history.map(h => {
                total += (h.diffs[name] || 0);
                return total;
            });
            return {
                label: name,
                data: data,
                borderColor: `hsl(${idx * 137.5}, 70%, 50%)`,
                tension: 0.2,
                fill: false
            };
        });
        chartObjects.trend.update();
    }

    // Data Management
    function exportData() {
        const data = { players, history };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `match_ledger_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                players = data.players || {};
                history = data.history || [];
                updateUI();
                alert("Data imported successfully!");
            } catch (err) { alert("Invalid backup file."); }
        };
        reader.readAsText(file);
    }

    function clearSession() {
        if (confirm("ARE YOU SURE? This deletes all players and match history forever.")) {
            localStorage.clear();
            location.reload();
        }
    }

    async function shareResult() {
        const zone = document.getElementById('captureZone');
        const canvas = await html2canvas(zone, { backgroundColor: '#ffffff', scale: 2 });
        const link = document.createElement('a');
        link.download = `match_summary_${new Date().getTime()}.png`;
        link.href = canvas.toDataURL();
        link.click();
    }

    // Run
    init();
</script>
</body>
</html>
