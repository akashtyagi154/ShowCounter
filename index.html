<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Match Ledger Pro | Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #6366f1; 
            --primary-dark: #4f46e5;
            --accent: #10b981; 
            --danger: #ef4444; 
            --bg: #fdfdfd; 
            --card: #ffffff;
            --text-main: #111827;
            --text-muted: #6b7280;
            --radius-lg: 20px;
            --radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }

        * { box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: var(--text-main);
            margin: 0; 
            padding: 20px 10px; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent; 
        }

        .container { 
            width: 100%; 
            max-width: 800px; 
        }

        header { text-align: center; margin-bottom: 32px; }
        h1 { 
            font-weight: 800; 
            font-size: 2.2rem; 
            margin: 0; 
            background: linear-gradient(to right, var(--primary), #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.05em;
        }
        header p { color: var(--text-muted); margin-top: 8px; font-weight: 500; }

        h2 { 
            font-size: 1.1rem; 
            font-weight: 700; 
            margin: 0 0 20px 0; 
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card {
            background: var(--card);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            border: 1px solid rgba(226, 232, 240, 0.8);
            transition: transform 0.2s ease;
        }

        .controls { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
        
        input[type="text"], select { 
            flex: 1; 
            min-width: 150px; 
            padding: 12px 16px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: var(--radius-md); 
            font-size: 0.95rem; 
            font-weight: 500;
            transition: all 0.2s;
            background: #f8fafc;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: #fff;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        button { 
            border: none; 
            border-radius: var(--radius-md); 
            padding: 12px 20px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); 
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:active { transform: translateY(1px); }

        .btn-main { background: var(--primary); color: white; box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3); }
        .btn-main:hover { background: var(--primary-dark); transform: translateY(-1px); }
        
        .btn-sec { background: white; color: var(--text-main); border: 1px solid #e2e8f0; }
        .btn-sec:hover { background: #f8fafc; border-color: #cbd5e1; }

        .btn-add { background: var(--accent); color: white; box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2); }
        .btn-add:hover { background: #059669; }

        .btn-danger { background: #fff; color: var(--danger); border: 1px solid #fee2e2; }
        .btn-danger:hover { background: #fef2f2; border-color: #fca5a5; }

        .btn-share { background: var(--text-main); color: white; width: 100%; padding: 16px; font-size: 1rem; margin-top: 12px; }

        .match-entry-card { 
            background: linear-gradient(to bottom right, #f8fafc, #eff6ff); 
            border: 2px solid #dbeafe; 
            padding: 24px; 
            border-radius: var(--radius-md); 
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .streak-highlight {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: white;
            padding: 20px;
            border-radius: var(--radius-md);
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .streak-val { font-size: 2.5rem; font-weight: 800; color: #fbbf24; }

        .table-container { overflow: hidden; border-radius: var(--radius-md); border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #f8fafc; text-align: left; padding: 16px; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        td { padding: 16px; border-top: 1px solid #f1f5f9; font-weight: 600; }
        
        .positive { color: var(--accent); }

        .chart-grid { display: grid; grid-template-columns: 1fr; gap: 24px; margin-bottom: 24px; }
        .chart-card { height: 320px; position: relative; }
        
        #historyLog { max-height: 300px; overflow-y: auto; padding-right: 5px; }
        #historyLog::-webkit-scrollbar { width: 6px; }
        #historyLog::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .hist-entry { 
            padding: 16px; 
            background: #f8fafc; 
            margin-bottom: 12px; 
            border-radius: var(--radius-md);
            border: 1px solid #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hist-info { display: flex; flex-direction: column; gap: 4px; }
        .hist-meta { color: var(--text-muted); font-size: 0.75rem; font-weight: 600; }
        .hist-winner { font-weight: 700; color: var(--primary); }

        .hidden { display: none; }

        @media (min-width: 768px) {
            .chart-grid { grid-template-columns: repeat(2, 1fr); }
            header { text-align: left; display: flex; justify-content: space-between; align-items: flex-end; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>Match Ledger Pro</h1>
            <p>Track victories & player performance</p>
        </div>
    </header>

    <div class="card">
        <h2><span style="color:var(--primary)">●</span> Players & Match</h2>
        <div class="controls">
            <input type="text" id="playerName" placeholder="Enter name...">
            <button class="btn-add" onclick="addPlayer()">Add Player</button>
        </div>
        <div class="controls" style="margin-top: 10px;">
            <button class="btn-main" style="flex: 2" onclick="toggleMatchEntry()">🏆 Log New Winner</button>
            <button class="btn-sec" onclick="exportData()">Export</button>
            <button class="btn-sec" onclick="document.getElementById('importFile').click()">Import</button>
            <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
        </div>
    </div>

    <div id="matchEntryArea" class="card hidden">
        <h2>🎯 Record Match Result</h2>
        <div class="match-entry-card">
            <label style="display:block; margin-bottom:8px; font-weight:600; font-size:0.9rem">Select the winner</label>
            <select id="winnerSelector" style="width: 100%; margin-bottom: 16px;"></select>
            <div style="display:flex; gap:10px">
                <button class="btn-main" style="flex:1" onclick="submitMatch()">Confirm Win</button>
                <button class="btn-sec" onclick="toggleMatchEntry()">Cancel</button>
            </div>
        </div>
    </div>

    <div id="captureZone">
        <div id="streakBox" class="streak-highlight hidden">
            <div>
                <p style="margin:0; font-size:0.8rem; text-transform:uppercase; letter-spacing:1px; color:#94a3b8">Active Hot Streak</p>
                <h3 id="streakOwner" style="margin:5px 0 0 0; font-size:1.4rem">Player Name</h3>
            </div>
            <div style="text-align:right">
                <div id="streakDisplay" class="streak-val">0</div>
                <p style="margin:0; font-size:0.7rem; color:#94a3b8">WINS IN A ROW</p>
            </div>
        </div>

        <div class="card">
            <h2><span style="color:var(--primary)">●</span> Analytics Dashboard</h2>
            
            <div class="chart-grid">
                <div class="chart-card">
                    <canvas id="balanceChart"></canvas>
                </div>
                <div class="chart-card">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="chart-grid">
                <div class="chart-card">
                    <canvas id="winShareChart"></canvas>
                </div>
                <div class="chart-card">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>

            <div class="chart-grid">
                <div class="chart-card" style="height: 350px; grid-column: 1 / -1;">
                    <canvas id="streakChart"></canvas>
                </div>
            </div>

            <div class="chart-grid">
                <div class="chart-card">
                    <canvas id="currentLosingChart"></canvas>
                </div>
                <div class="chart-card">
                    <canvas id="longestLosingChart"></canvas>
                </div>
            </div>
        </div>

        <div class="card">
            <h2><span style="color:var(--accent)">●</span> Current Rankings</h2>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Player Name</th>
                            <th style="text-align: right;">Match Wins</th>
                        </tr>
                    </thead>
                    <tbody id="balanceBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2 style="margin: 0;"><span style="color:var(--text-muted)">●</span> Match Log</h2>
            <button class="btn-danger" style="padding: 6px 12px; font-size: 0.75rem" onclick="undoLastMatch()">Undo Last</button>
        </div>
        <div id="historyLog"></div>
        
        <div style="margin-top: 32px; padding-top: 24px; border-top: 1px solid #f1f5f9;">
            <div class="controls">
                <select id="removeSelector"></select>
                <button class="btn-danger" style="flex: none;" onclick="removePlayer()">Remove Player</button>
            </div>
            <button class="btn-share" onclick="shareResult()">Download Results Image</button>
            <button class="btn-danger" style="width: 100%; margin-top: 40px; border: none; background: #fff1f2; font-weight: 600" onclick="clearSession()">Reset All Data</button>
        </div>
    </div>
</div>

<script>
    let players = JSON.parse(localStorage.getItem('m_players')) || {};
    let history = JSON.parse(localStorage.getItem('m_history')) || [];
    let chartObjects = {};

    function init() {
        initCharts();
        updateUI();
    }

    function calculateStreaks() {
        let currentWinStreak = 0;
        let streakWinner = "";
        let longestWinStreaks = {};
        
        let currentLosingStreaks = {};
        let longestLosingStreaks = {};
        
        // Initialize for all players
        Object.keys(players).forEach(p => {
            longestWinStreaks[p] = 0;
            currentLosingStreaks[p] = 0;
            longestLosingStreaks[p] = 0;
        });

        if (history.length > 0) {
            // 1. Current Winning Streak (Last Winner only)
            streakWinner = history[history.length - 1].winner;
            for (let i = history.length - 1; i >= 0; i--) {
                if (history[i].winner === streakWinner) currentWinStreak++;
                else break;
            }

            // 2. All-time Longest Winning Streaks
            let prevWinner = "";
            let count = 0;
            history.forEach(h => {
                if (h.winner === prevWinner) count++;
                else { prevWinner = h.winner; count = 1; }
                if (longestWinStreaks.hasOwnProperty(prevWinner)) {
                    longestWinStreaks[prevWinner] = Math.max(longestWinStreaks[prevWinner], count);
                }
            });

            // 3. Current & Longest Losing Streaks (Not Winning)
            Object.keys(players).forEach(p => {
                let currentL = 0;
                let maxL = 0;
                history.forEach(h => {
                    if (h.winner !== p) {
                        currentL++;
                    } else {
                        maxL = Math.max(maxL, currentL);
                        currentL = 0;
                    }
                });
                currentLosingStreaks[p] = currentL;
                longestLosingStreaks[p] = Math.max(maxL, currentL);
            });
        }

        return {
            win: { current: { winner: streakWinner, count: currentWinStreak }, longest: longestWinStreaks },
            losing: { current: currentLosingStreaks, longest: longestLosingStreaks }
        };
    }

    function initCharts() {
        const commonOptions = { 
            responsive: true, 
            maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { 
                legend: { display: true, position: 'bottom', labels: { font: { family: 'Plus Jakarta Sans', weight: '600', size: 10 }, usePointStyle: true } },
                tooltip: { backgroundColor: '#111827', titleFont: { family: 'Plus Jakarta Sans' }, bodyFont: { family: 'Plus Jakarta Sans' } },
                title: { display: true, font: { weight: 'bold', family: 'Plus Jakarta Sans', size: 13 } }
            },
            scales: {
                y: { beginAtZero: true, grid: { color: '#f1f5f9' }, ticks: { precision: 0 } },
                x: { grid: { display: false } }
            }
        };
        
        chartObjects.balance = new Chart(document.getElementById('balanceChart'), {
            type: 'bar', data: { labels: [], datasets: [{ label: 'Total Wins', data: [], backgroundColor: '#6366f1', borderRadius: 8 }] },
            options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { text: 'Wins per Player' } } }
        });

        chartObjects.trend = new Chart(document.getElementById('trendChart'), {
            type: 'line', data: { labels: [], datasets: [] },
            options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { text: 'Win Trajectory' } } }
        });

        // New Chart: Win Share Donut
        chartObjects.winShare = new Chart(document.getElementById('winShareChart'), {
            type: 'doughnut', data: { labels: [], datasets: [{ data: [], backgroundColor: [] }] },
            options: { ...commonOptions, scales: { x: {display: false}, y: {display: false} }, plugins: { ...commonOptions.plugins, title: { text: 'Win Share (%)' } } }
        });

        // New Chart: Radar Performance
        chartObjects.radar = new Chart(document.getElementById('radarChart'), {
            type: 'radar', data: { labels: ['Total Wins', 'Max Streak', 'Form', 'Drought Res.'], datasets: [] },
            options: { ...commonOptions, scales: { r: { angleLines: { display: true }, suggestMin: 0 } }, plugins: { ...commonOptions.plugins, title: { text: 'Attribute Comparison' } } }
        });

        chartObjects.streak = new Chart(document.getElementById('streakChart'), {
            type: 'bar', data: { labels: [], datasets: [{ label: 'Max Wins in a Row', data: [], backgroundColor: '#fbbf24', borderRadius: 8 }] },
            options: { ...commonOptions, indexAxis: 'y', plugins: { ...commonOptions.plugins, title: { text: 'Longest Winning Streaks' } } }
        });

        chartObjects.currentLosing = new Chart(document.getElementById('currentLosingChart'), {
            type: 'bar', data: { labels: [], datasets: [{ label: 'Matches since last win', data: [], backgroundColor: '#ef4444', borderRadius: 8 }] },
            options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { text: 'Current Cold Streaks' } } }
        });

        chartObjects.longestLosing = new Chart(document.getElementById('longestLosingChart'), {
            type: 'bar', data: { labels: [], datasets: [{ label: 'Longest Drought', data: [], backgroundColor: '#94a3b8', borderRadius: 8 }] },
            options: { ...commonOptions, plugins: { ...commonOptions.plugins, title: { text: 'Longest Not-Winning Streaks' } } }
        });
    }

    function updateUI() {
        const streaks = calculateStreaks();
        const streakBox = document.getElementById('streakBox');
        if (streaks.win.current.count > 1) {
            streakBox.classList.remove('hidden');
            document.getElementById('streakOwner').innerText = streaks.win.current.winner;
            document.getElementById('streakDisplay').innerText = streaks.win.current.count;
        } else { streakBox.classList.add('hidden'); }

        renderBalanceTable();
        renderHistory();
        updateCharts(streaks);
        populateRemoveDropdown();
        localStorage.setItem('m_players', JSON.stringify(players));
        localStorage.setItem('m_history', JSON.stringify(history));
    }

    function addPlayer() {
        const name = document.getElementById('playerName').value.trim();
        if (name && !players.hasOwnProperty(name)) {
            players[name] = 0;
            document.getElementById('playerName').value = '';
            updateUI();
        }
    }

    function removePlayer() {
        const name = document.getElementById('removeSelector').value;
        if (name && confirm(`Delete ${name}?`)) { delete players[name]; updateUI(); }
    }

    function populateRemoveDropdown() {
        const sel = document.getElementById('removeSelector');
        sel.innerHTML = '<option value="">Choose player to remove...</option>';
        Object.keys(players).sort().forEach(n => { sel.innerHTML += `<option value="${n}">${n}</option>`; });
    }

    function toggleMatchEntry() {
        const names = Object.keys(players).sort();
        if (names.length < 1) return alert("Please add at least one player first!");
        document.getElementById('matchEntryArea').classList.toggle('hidden');
        const sel = document.getElementById('winnerSelector');
        sel.innerHTML = '<option value="">-- Who won? --</option>';
        names.forEach(name => { sel.innerHTML += `<option value="${name}">${name}</option>`; });
    }

    function submitMatch() {
        const winner = document.getElementById('winnerSelector').value;
        if (!winner) return alert("Select a winner!");
        players[winner] += 1;
        history.push({
            timestamp: new Date().toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }),
            winner: winner
        });
        document.getElementById('matchEntryArea').classList.add('hidden');
        updateUI();
    }

    function undoLastMatch() {
        if (history.length === 0) return alert("No matches to undo.");
        if (confirm("Remove the last recorded win?")) {
            const last = history.pop();
            if (players.hasOwnProperty(last.winner)) players[last.winner] = Math.max(0, players[last.winner] - 1);
            updateUI();
        }
    }

    function renderBalanceTable() {
        const body = document.getElementById('balanceBody');
        body.innerHTML = '';
        Object.keys(players).sort().forEach(name => {
            const row = body.insertRow();
            row.insertCell(0).innerText = name;
            const cellVal = row.insertCell(1);
            cellVal.style.textAlign = 'right';
            cellVal.innerHTML = `<span class="positive">${players[name]}</span>`;
        });
    }

    function renderHistory() {
        const log = document.getElementById('historyLog');
        log.innerHTML = history.slice().reverse().map((h, i) => {
            return `<div class="hist-entry"><div class="hist-info">
                <span class="hist-meta">Match #${history.length - i}</span>
                <span class="hist-winner">${h.winner} won</span>
                </div><span class="hist-meta">${h.timestamp}</span></div>`;
        }).join('');
    }

    function updateCharts(streaks) {
        const names = Object.keys(players).sort();
        
        // 1. Total Wins
        chartObjects.balance.data.labels = names;
        chartObjects.balance.data.datasets[0].data = names.map(n => players[n]);
        chartObjects.balance.update();

        // 2. Trajectory
        chartObjects.trend.data.labels = history.length > 0 ? history.map((_, i) => i + 1) : [0];
        chartObjects.trend.data.datasets = names.map((name, idx) => {
            let total = 0;
            return {
                label: name, data: history.map(h => { if (h.winner === name) total += 1; return total; }),
                borderColor: `hsl(${idx * 137.5}, 70%, 55%)`, tension: 0.4, borderWidth: 3, pointRadius: 4, fill: false
            };
        });
        chartObjects.trend.update();

        // 3. Win Share %
        chartObjects.winShare.data.labels = names;
        chartObjects.winShare.data.datasets[0].data = names.map(n => players[n]);
        chartObjects.winShare.data.datasets[0].backgroundColor = names.map((_, idx) => `hsl(${idx * 137.5}, 70%, 55%)`);
        chartObjects.winShare.update();

        // 4. Radar Attributes
        chartObjects.radar.data.datasets = names.map((name, idx) => {
            // Form is wins in last 5 matches
            const last5 = history.slice(-5);
            const form = last5.filter(h => h.winner === name).length;
            // Drought Res is inverse of longest drought (capped for viz)
            const droughtRes = Math.max(0, 10 - streaks.losing.longest[name]);
            
            return {
                label: name,
                data: [players[name], streaks.win.longest[name], form, droughtRes],
                borderColor: `hsl(${idx * 137.5}, 70%, 55%)`,
                backgroundColor: `hsla(${idx * 137.5}, 70%, 55%, 0.2)`,
                pointBackgroundColor: `hsl(${idx * 137.5}, 70%, 55%)`
            };
        });
        chartObjects.radar.update();

        // 5. Hot Streaks
        chartObjects.streak.data.labels = names;
        chartObjects.streak.data.datasets[0].data = names.map(n => streaks.win.longest[n]);
        chartObjects.streak.update();

        // 6. Current Cold Streaks
        chartObjects.currentLosing.data.labels = names;
        chartObjects.currentLosing.data.datasets[0].data = names.map(n => streaks.losing.current[n]);
        chartObjects.currentLosing.update();

        // 7. Longest Cold Streaks
        chartObjects.longestLosing.data.labels = names;
        chartObjects.longestLosing.data.datasets[0].data = names.map(n => streaks.losing.longest[n]);
        chartObjects.longestLosing.update();
    }

    function exportData() {
        const blob = new Blob([JSON.stringify({ players, history }, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `ledger_backup.json`; a.click();
    }

    function importData(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            try {
                const data = JSON.parse(ev.target.result);
                players = data.players || {}; history = data.history || [];
                updateUI();
            } catch (err) { alert("Import failed."); }
        };
        reader.readAsText(file);
    }

    function clearSession() { if (confirm("Permanently delete all data?")) { localStorage.clear(); location.reload(); } }

    async function shareResult() {
        const zone = document.getElementById('captureZone');
        const canvas = await html2canvas(zone, { backgroundColor: '#fdfdfd', scale: 2 });
        const link = document.createElement('a'); link.download = `match_results.png`; link.href = canvas.toDataURL(); link.click();
    }

    init();
</script>
</body>
</html>
